<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="controls">
        <button id="theme-toggle">🌙 Dark Mode</button>
    </div>
    
    <div class="main-wrapper">
        <div class="container">
            <h1>Lotto Number Generator</h1>
            <button id="generate">Generate Numbers</button>
            <div id="numbers" class="numbers-container"></div>
        </div>

        <div class="container inquiry-form">
            <h2>Partnership Inquiry (제휴 문의)</h2>
            <form action="https://formspree.io/f/mzdjezze" method="POST">
                <div class="form-group">
                    <label for="name">Name (성함/상호명)</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="example@domain.com" required>
                </div>
                <div class="form-group">
                    <label for="message">Inquiry Details (문의 내용)</label>
                    <textarea id="message" name="message" rows="4" placeholder="How can we collaborate?" required></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </div>

        <div class="container comments-section">
            <h2>Comments (댓글)</h2>
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
                var disqus_config = function () {
                    this.page.url = window.location.href;  // Replace PAGE_URL with your page's canonical URL variable
                    this.page.identifier = 'lotto-generator-main'; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                };
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://product-builder-lecture.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
